<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAC Registration 2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg-body: #010103;
            --bg-card-form: #0d0d1a;
            --accent-purple: #9b51e0;
            --accent-cyan: #00e5ff;
            --label-red: #ff0000;
            --input-bg: #151525;
            --btn-grad: linear-gradient(90deg, #38bdf8 0%, #a855f7 100%);
        }

        body {
            background-color: var(--bg-body);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 15px;
        }

        /* --- LOGO ORBIT --- */
        .logo-area {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .eac-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 0 0 10px #a855f7;
        }

        .orbit {
            position: absolute;
            border-radius: 50%;
            width: 130px;
            height: 48px;
            border: 1.5px solid;
        }

        .o1 { border-color: var(--accent-purple); transform: rotate(45deg); animation: orb 3s linear infinite; }
        .o2 { border-color: #38bdf8; transform: rotate(-45deg); animation: orb 4s linear infinite reverse; }
        .o3 { border-color: var(--label-red); transform: rotate(90deg); animation: orb 5s linear infinite; opacity: 0.6; }

        @keyframes orb {
            0% { transform: rotate(var(--tw-rotate, 0deg)) scaleY(1); }
            100% { transform: rotate(calc(var(--tw-rotate, 0deg) + 360deg)) scaleY(1); }
        }

        .main-title { font-family: 'Orbitron', sans-serif; font-size: 26px; margin-bottom: 5px; }
        .main-title span { color: #a855f7; text-shadow: 0 0 15px #a855f7; }
        .desc-title { color: #e67e22; font-size: 11px; letter-spacing: 2px; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; }

        /* --- FORM --- */
        .form-container {
            background: var(--bg-card-form);
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .field { margin-bottom: 15px; }
        label { display: block; color: var(--label-red); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: var(--input-bg); border: 1px solid #252535; border-radius: 8px; padding: 12px; color: #ccc; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

        .btn-generate {
            width: 100%; padding: 15px; border-radius: 30px; border: none;
            background: var(--btn-grad); color: white; font-family: 'Orbitron', sans-serif;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* --- DESAIN KARTU IDENTITAS --- */
        #id-card-capture {
            position: absolute;
            left: -9999px;
            width: 600px;
            height: 350px;
            background-color: #01040a;
            border: 4px solid var(--accent-cyan);
            border-radius: 25px;
            padding: 20px 40px;
            box-sizing: border-box;
            color: white;
        }

        .card-header-text { text-align: right; font-size: 14px; color: #777; margin-bottom: 0; }
        .card-title { text-align: center; font-size: 28px; font-weight: bold; letter-spacing: 4px; margin: 10px 0; font-family: 'Arial', sans-serif; }
        .card-line { width: 100%; height: 2px; background-color: #004d4d; margin-bottom: 30px; }
        .card-info-row { display: flex; margin-bottom: 15px; font-family: 'Arial', sans-serif; font-size: 20px; font-weight: bold; }
        .card-label { width: 140px; color: var(--accent-cyan); text-transform: uppercase; flex-shrink: 0; }
        .card-value { color: white; text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="logo-area">
        <div class="orbit o1" style="--tw-rotate: 45deg"></div>
        <div class="orbit o2" style="--tw-rotate: -45deg"></div>
        <div class="orbit o3" style="--tw-rotate: 90deg"></div>
        <div class="eac-badge">EAC</div>
    </div>

    <div class="main-title">EAC <span>REGISTRASI 2</span></div>
    <div class="desc-title">Education Astronomy Creator</div>

    <div class="container form-container">
        <div class="field"><label>Nama Lengkap</label><input type="text" id="in-nama" placeholder="Nama asli..."></div>
        <div class="field"><label>Umur</label><input type="number" id="in-umur" placeholder="minimal 12"></div>
        <div class="field">
            <label>Status</label>
            <select id="in-status">
                <option>lainnya</option>
                <option>Pelajar</option>
                <option>Mahasiswa</option>
                <option>Umum</option>
            </select>
        </div>
        <div class="field"><label>Username TikTok</label><input type="text" id="in-tiktok" placeholder="Nama akun tiktok"></div>
        <div class="field"><label>Alasan Bergabung</label><textarea id="in-alasan" rows="2" placeholder="Tulis alasan..."></textarea></div>

        <button class="btn-generate" onclick="generateIDCard()">GENERATE KARTU</button>
    </div>

    <div id="id-card-capture">
        <p class="card-header-text">EAC COMMUNITY</p>
        <div class="card-title">KARTU IDENTITAS EAC</div>
        <div class="card-line"></div>
        
        <div class="card-info-row">
            <div class="card-label">NAMA:</div>
            <div class="card-value" id="out-nama"></div>
        </div>
        <div class="card-info-row">
            <div class="card-label">UMUR:</div>
            <div class="card-value" id="out-umur"></div>
        </div>
        <div class="card-info-row">
            <div class="card-label">STATUS:</div>
            <div class="card-value" id="out-status"></div>
        </div>
        <div class="card-info-row">
            <div class="card-label">TIKTOK:</div>
            <div class="card-value" id="out-tiktok"></div>
        </div>
        <div class="card-info-row">
            <div class="card-label">ALASAN:</div>
            <div class="card-value" id="out-alasan"></div>
        </div>
    </div>

    <script>
        function generateIDCard() {
            const nama = document.getElementById('in-nama').value;
            const alasan = document.getElementById('in-alasan').value;
            
            if(!nama) return alert("Isi nama dulu!");
            if(!alasan) return alert("Alasannya diisi juga ya!");

            // Menyambungkan input ke kartu
            document.getElementById('out-nama').innerText = nama;
            document.getElementById('out-umur').innerText = document.getElementById('in-umur').value;
            document.getElementById('out-status').innerText = document.getElementById('in-status').value;
            document.getElementById('out-tiktok').innerText = document.getElementById('in-tiktok').value;
            document.getElementById('out-alasan').innerText = alasan; // Ini perbaikannya!

            const card = document.getElementById('id-card-capture');

            html2canvas(card, { backgroundColor: null, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `ID_CARD_EAC_${nama}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();

                setTimeout(() => {
                    window.location.href = "https://chat.whatsapp.com/C0CyxNd1FYsEbCqtmHLncr?mode=gi_t";
                }, 2000);
            });
        }
    </script>
</body>
</html>
